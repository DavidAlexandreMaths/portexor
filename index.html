<!DOCTYPE html>
<html lang="fr">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<head>
  <meta charset="UTF-8">
  <title>Porte XOR</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #202020;
      color: white;
      font-family: Arial;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
    }
    input[type="number"] {
      width: 60px;
    }
    button {
      margin-top: 10px;
      padding: 6px 14px;
      cursor: pointer;
      background: #444;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }
    button:hover {
      background: #666;
    }
  </style>
</head>
<body>
<div id="ui">
  <div>
    <button id="levier1">Bouger le levier de gauche : ▶</button>
  </div>
  <br>
  <div>
    <button id="levier2">Bouger le levier de droite : ▶</button>
  </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
